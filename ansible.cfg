[defaults]
forks=8
inventory = inventory.aws_ec2.yaml
#inventory = inventory.ini
remote_user = ec2-user
#private_key_file=/home/ec2-user/keys/ansible.pem

#  normal ansible configuration hanges can be made and used in a configuration file which will be searched for in the following order:

# 1. ANSIBLE_CONFIG (environment variable if set) it first searches for this file and then 2 followed by 3 and 4  

# 2. ansible.cfg (in the current directory)

# 3. ~/.ansible.cfg (in the home directory)

# 4. /etc/ansible/ansible.cfg  
